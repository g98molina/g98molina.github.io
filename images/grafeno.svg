<svg xmlns="http://www.w3.org/2000/svg" width="120" height="104">
  <g stroke="#1D9E75" stroke-width="1.5" fill="#1D9E75">
    <!-- Celda unitaria de grafeno: red honeycomb correcta -->
    <!-- d = 20px (longitud enlace C-C) -->
    <!-- Átomo A: (60, 12) -->
    <!-- Átomo B: (60, 32) — enlace vertical -->
    <!-- Desde B: enlace abajo-izq a (43, 42), enlace abajo-der a (77, 42) -->
    <!-- Desde esos: enlace vertical abajo a (43, 62) y (77, 62) -->
    <!-- Desde esos: enlazan al próximo A de la celda siguiente -->

    <line x1="60" y1="12" x2="60" y2="32"/>
    <line x1="60" y1="32" x2="43" y2="42"/>
    <line x1="60" y1="32" x2="77" y2="42"/>
    <line x1="43" y1="42" x2="43" y2="62"/>
    <line x1="77" y1="42" x2="77" y2="62"/>
    <line x1="43" y1="62" x2="60" y2="72"/>
    <line x1="77" y1="62" x2="60" y2="72"/>
    <line x1="60" y1="72" x2="60" y2="92"/>
    <line x1="43" y1="42" x2="26" y2="32"/>
    <line x1="77" y1="42" x2="94" y2="32"/>
    <line x1="26" y1="32" x2="26" y2="12"/>
    <line x1="94" y1="32" x2="94" y2="12"/>

    <circle cx="60" cy="12" r="2.5"/>
    <circle cx="60" cy="32" r="2.5"/>
    <circle cx="43" cy="42" r="2.5"/>
    <circle cx="77" cy="42" r="2.5"/>
    <circle cx="43" cy="62" r="2.5"/>
    <circle cx="77" cy="62" r="2.5"/>
    <circle cx="60" cy="72" r="2.5"/>
    <circle cx="60" cy="92" r="2.5"/>
    <circle cx="26" cy="32" r="2.5"/>
    <circle cx="94" cy="32" r="2.5"/>
    <circle cx="26" cy="12" r="2.5"/>
    <circle cx="94" cy="12" r="2.5"/>
  </g>
</svg>
